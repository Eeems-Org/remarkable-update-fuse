name: Check and Build
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  release:
    types: [released]
permissions: read-all
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Debug flags
        shell: bash
        if: runner.debug == '1'
        run: echo 'FLAGS=-d' >> "$GITHUB_ENV"
      - name: Checkout the Git repository
        uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Lint code
        run: make lint format
  test:
    name: Test with python ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: &python-versions
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - name: Install Apt packages
        id: cache-apt
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          execute_install_scripts: true
          packages: libfuse-dev
          version: 1.0
      - name: Checkout the Git repository
        uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: "pip"
      - name: Cache test files
        uses: actions/cache@v5
        with:
          path: |
            .venv/bin/codexctl.bin
            .venv/*_reMarkable2-*.signed
          key: test-files-${{ hashFiles('Makefile') }}
      - name: Run tests
        run: make test
  build-executable-ubuntu:
    name: Build binary for ubuntu
    needs: [test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python:
          - "3.11"
    steps:
      - name: Install Apt packages
        id: cache-apt
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          execute_install_scripts: true
          packages: libfuse-dev ccache
          version: 1.0
      - name: Checkout the Git repository
        uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: "pip"
      - name: Nuitka ccache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.nuitka
          key: ${{ github.job }}-ccache-ubuntu-latest
      - name: Build with nuitka
        run: make executable
      - uses: actions/upload-artifact@v6
        with:
          name: rmufuse-ubuntu
          path: dist
          if-no-files-found: error
  build-executable-alpine:
    name: Build binary for alpine ${{ matrix.alpine }}
    needs: [test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        alpine:
          - v3.19
    steps:
      - name: Checkout the Git repository
        uses: actions/checkout@v6
      - uses: jirutka/setup-alpine@v1
        with:
          branch: ${{ matrix.alpine }}
          packages: >
            build-base
            python3
            python3-dev
            py3-pip
            py3-wheel
            ccache
            fuse-dev
            git
            patchelf
            upx
      - name: Nuitka ccache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.nuitka
          key: ${{ github.job }}-ccache-alpine-${{ matrix.alpine }}
      - name: Build with nuitka
        shell: alpine.sh {0}
        run: |
          make executable
      - uses: actions/upload-artifact@v6
        with:
          name: rmufuse-alpine
          path: dist
          if-no-files-found: error
  build-executable-remarkable:
    name: Build binary for reMarkable
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the Git repository
        uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Nuitka ccache
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.nuitka
          key: ${{ github.job }}-ccache-remarkable-2.15.1
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build with nuitka
        run: |
          set -e
          ./make_for_remarkable.sh portable \
          | while read -r line; do
            if [[ "$line" == 'Nuitka'*':ERROR:'* ]] || [[ "$line" == "ERROR:"* ]]; then
              echo "::error file=${{ steps.args.outputs.main_file }},title=Nuitka Error::$line"
            elif [[ "$line" == 'Nuitka'*':WARNING:'* ]] || [[ "$line" == "WARNING:"* ]]; then
              echo "::warning file=${{ steps.args.outputs.main_file }},title=Nuitka Warning::$line"
            elif [[ "$line" == 'Nuitka:INFO:'* ]] || [[ "$line" == "INFO:"* ]]; then
              echo "$line"
            else
              echo "::debug::$line"
            fi
          done
        working-directory: ${{ github.workspace }}
      - uses: actions/upload-artifact@v6
        with:
          name: rmufuse-remarkable
          path: dist
          if-no-files-found: error
      - name: Free up space
        run: |
          export DEBIAN_FRONTEND="noninteractive"
          sudo apt-get autoremove -y
          sudo apt-get autoclean -y
          sudo rm -rf \
            /usr/lib/jvm \
            /usr/share/dotnet \
            /usr/share/swift \
            /usr/local/.ghcup \
            /usr/local/julia* \
            /usr/local/lib/android \
            /usr/local/share/chromium \
            /opt/microsoft /opt/google \
            /opt/az \
            /usr/local/share/powershell
      - name: Sanity check
        uses: Eeems-Org/run-in-remarkable-action@v1
        with:
          fw_version: 2.15.1
          run: ./rmufuse-portable --help
          path: dist
  build-wheel:
    name: Build wheel with python ${{ matrix.python }}
    needs: [test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: *python-versions
    steps:
      - name: Checkout the Git repository
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: "pip"
      - name: Building package
        run: |
          python_version=${{ matrix.python }}
          python_version=cp${python_version//.}
          script=$(cat <<EOF
          cd /src;
          export PATH=\$PATH:/opt/python/$python_version-$python_version/bin;
          make ${{ env.FLAGS }} native-wheel;
          auditwheel repair dist/*.whl;
          EOF
          )
          docker run -v $(pwd):/src \
            quay.io/pypa/manylinux_2_34_x86_64:latest \
            /bin/bash -c "$script"
      - uses: actions/upload-artifact@v6
        with:
          name: pip-wheel-${{ matrix.python }}
          path: wheelhouse/*
          if-no-files-found: error
  build-any-wheel:
    name: Build wheel
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - name: Checkout the Git repository
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install build tool
        run: pip install build
      - name: Building package
        run: make wheel
      - uses: actions/upload-artifact@v6
        with:
          name: pip-wheel-none-any
          path: dist/*
          if-no-files-found: error
  build-sdist:
    name: Build sdist
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the Git repository
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install build tool
        run: pip install build
      - name: Building package
        run: make sdist
      - uses: actions/upload-artifact@v6
        with:
          name: pip-sdist
          path: dist/*
          if-no-files-found: error
  publish:
    name: Publish to PyPi
    if: github.repository == 'Eeems-Org/remarkable-update-fuse' && github.event_name == 'release' && startsWith(github.ref, 'refs/tags')
    needs:
      - build-sdist
      - build-wheel
      - build-any-wheel
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    environment:
      name: pypi
      url: https://pypi.org/p/remarkable_update_fuse
    steps:
      - name: Download pip packages
        id: download
        uses: actions/download-artifact@v8
        with:
          pattern: pip-*
          merge-multiple: true
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ steps.download.outputs.download-path }}
          skip-existing: true
  release:
    name: Add ${{ matrix.artifact }} to release
    if: github.repository == 'Eeems-Org/remarkable-update-fuse' && github.event_name == 'release' && startsWith(github.ref, 'refs/tags')
    needs:
      - build-executable-ubuntu
      - build-executable-alpine
      - build-executable-remarkable
      - build-wheel
      - build-any-wheel
      - build-sdist
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout the Git repository
        uses: actions/checkout@v6
      - name: Download pip packages
        id: download
        uses: actions/download-artifact@v8
        with:
          pattern: pip-*
          merge-multiple: true
      - name: Upload to release
        run: find . -type f | xargs -rI {} gh release upload "$TAG" {} --clobber
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        working-directory: ${{ steps.download.outputs.download-path }}
